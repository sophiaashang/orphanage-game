<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>夜访孤儿院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            touch-action: none;
            font-family: 'Courier New', monospace;
        }
        #game { 
            position: relative; 
            width: 100vmin;
            height: 100vmin;
            max-width: 600px;
            max-height: 600px;
            /* 极细黑色边框 - 参考风格 */
            border: 1px solid #1a1a1a;
            background: #000;
        }
        canvas { 
            width: 100%; 
            height: 100%; 
            display: block;
            image-rendering: pixelated;
        }
        
        /* 摇杆 - 复古风格 */
        #joystick {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 90px;
            height: 90px;
            background: rgba(30,30,30,0.9);
            border: 1px solid #3a3a3a;
            border-radius: 0;
        }
        #knob {
            position: absolute;
            width: 36px;
            height: 36px;
            background: #555;
            border: 1px solid #888;
            left: 27px;
            top: 27px;
        }
        
        /* E按钮 - 复古红色 */
        #actBtn {
            position: absolute;
            right: 20px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            background: #1a1a1a;
            border: 1px solid #8b0000;
            color: #c44;
            font-size: 18px;
            font-weight: bold;
            display: none;
            font-family: monospace;
        }
        
        /* 对话框 - 参考风格：深灰+白色细边框 */
        #dialog {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 1px solid #fff;
            padding: 15px 20px 25px 20px;
            display: none;
            color: #fff;
            max-height: 50%;
            overflow-y: auto;
            touch-action: auto;
            z-index: 100;
            font-family: 'Courier New', monospace;
        }
        #dialog h3 { 
            color: #ccc; 
            margin-bottom: 8px; 
            font-size: 14px;
            font-weight: normal;
        }
        #dialog p { 
            color: #fff; 
            font-size: 13px; 
            line-height: 1.7;
        }
        #dialogBtn { 
            background: transparent; 
            border: 1px solid #555; 
            color: #888; 
            padding: 8px 20px; 
            cursor: pointer; 
            margin-top: 12px;
            font-size: 12px;
            font-family: monospace;
            touch-action: auto;
            min-height: 36px;
            min-width: 70px;
            position: absolute;
            right: 15px;
            bottom: 15px;
        }
        #dialogBtn:active {
            background: #333;
            border-color: #888;
            color: #fff;
        }
        /* 对话框右下角下箭头 */
        #dialog::after {
            content: '▼';
            position: absolute;
            right: 15px;
            bottom: 8px;
            color: #666;
            font-size: 10px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        /* 提示 - 简洁风格 */
        #hint {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            background: #0a0a0a;
            padding: 6px 12px;
            border: 1px solid #333;
            display: none;
            font-family: monospace;
        }
        
        /* 房间名 - 左上角 */
        #roomName {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
            font-family: monospace;
            background: #0a0a0a;
            padding: 4px 8px;
            border: 1px solid #333;
        }
        
        /* 线索计数 */
        #clueCount {
            position: absolute;
            top: 10px;
            right: 55px;
            color: #8b0000;
            font-size: 11px;
            background: #0a0a0a;
            padding: 4px 8px;
            border: 1px solid #333;
            font-family: monospace;
        }
        
        /* 音效按钮 - 简洁 */
        #soundBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #555;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #soundBtn.active {
            color: #666;
            border-color: #555;
        }
        
        /* 加载画面 - 极简黑色 */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 200;
        }
        #loading h2 {
            font-size: 18px;
            color: #8b0000;
            margin-bottom: 30px;
            font-weight: normal;
            letter-spacing: 4px;
        }
        #loadingDots {
            font-size: 14px;
            color: #444;
            font-family: monospace;
        }
        #loadingBar {
            width: 150px;
            height: 2px;
            background: #1a1a1a;
            margin-top: 20px;
            overflow: hidden;
        }
        #loadingProgress {
            width: 0%;
            height: 100%;
            background: #8b0000;
            transition: width 0.3s;
        }
        
        /* 主菜单 - 深色压抑风格 */
        #mainMenu {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 150;
            padding: 20px;
            touch-action: auto;
        }
        #mainMenu h1 {
            font-size: 20px;
            color: #8b0000;
            margin-bottom: 8px;
            font-weight: normal;
            letter-spacing: 6px;
        }
        #mainMenu .subtitle {
            color: #444;
            margin-bottom: 50px;
            font-size: 11px;
            letter-spacing: 2px;
        }
        .menuBtn {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 14px 50px;
            font-size: 13px;
            cursor: pointer;
            margin: 6px 0;
            width: 200px;
            min-height: 44px;
            transition: all 0.2s;
            touch-action: auto;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .menuBtn:active {
            background: #1a1a1a;
            border-color: #8b0000;
            color: #c44;
        }
        .menuBtn:hover, .menuBtn:active {
            background: #0a0a0a;
            border-color: #8b0000;
            color: #c44;
        }
        .menuBtn:disabled {
            background: transparent;
            border-color: #222;
            color: #333;
            cursor: not-allowed;
        }
        .menuBtn:disabled:hover {
            background: transparent;
            border-color: #222;
        }
        #mainMenu .controls {
            margin-top: 40px;
            color: #333;
            font-size: 10px;
            text-align: center;
            line-height: 1.8;
            letter-spacing: 1px;
        }
        
        /* 章节选择 */
        #chapterSelect {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 160;
            padding: 20px;
            touch-action: auto;
        }
        #chapterSelect h2 {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            font-weight: normal;
            letter-spacing: 4px;
        }
        .chapterBtn {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 12px 25px;
            font-size: 12px;
            cursor: pointer;
            margin: 5px 0;
            width: 220px;
            min-height: 44px;
            text-align: left;
            transition: all 0.2s;
            touch-action: auto;
            font-family: monospace;
        }
        .chapterBtn:active:not(:disabled) {
            background: #1a1a1a;
            border-color: #8b0000;
            color: #c44;
        }
        .chapterBtn:hover:not(:disabled) {
            background: #0a0a0a;
            border-color: #555;
        }
        .chapterBtn:disabled {
            background: transparent;
            border-color: #222;
            color: #333;
            cursor: not-allowed;
        }
        .chapterBtn .ch-name { color: #888; }
        .chapterBtn .ch-status { font-size: 10px; color: #444; display: block; margin-top: 2px; }
        .chapterBtn .ch-lock { color: #444; }
        
        #backBtn {
            margin-top: 25px;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 10px 25px;
            font-size: 11px;
            cursor: pointer;
            min-height: 40px;
            touch-action: auto;
            font-family: monospace;
        }
        #backBtn:active {
            background: #1a1a1a;
            border-color: #555;
        }
        
        /* 开场画面 */
        #intro {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            color: #fff;
            padding: 20px;
            padding-bottom: 80px;
            z-index: 100;
            touch-action: auto;
            overflow-y: auto;
        }
        #intro h1 {
            font-size: 18px;
            color: #8b0000;
            margin-bottom: 30px;
            font-weight: normal;
            letter-spacing: 6px;
            flex-shrink: 0;
        }
        #intro .story {
            font-size: 12px;
            line-height: 2;
            color: #666;
            text-align: left;
            max-width: 380px;
            margin-bottom: 30px;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }
        #intro .story span {
            color: #8b0000;
        }
        #intro button {
            background: transparent;
            border: 1px solid #8b0000;
            color: #c44;
            padding: 14px 40px;
            font-size: 13px;
            cursor: pointer;
            min-height: 44px;
            touch-action: auto;
            flex-shrink: 0;
            margin-top: auto;
            font-family: monospace;
            letter-spacing: 2px;
        }
        #intro button:active {
            background: #1a0000;
        }
        
        /* 结局画面 - 深色压抑 */
        #ending {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 30px;
            z-index: 100;
            touch-action: auto;
        }
        #ending h2 {
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: normal;
            letter-spacing: 4px;
        }
        #ending .ending-text {
            font-size: 12px;
            line-height: 2;
            color: #666;
            text-align: center;
            max-width: 400px;
            margin-bottom: 35px;
            max-height: 60vh;
            overflow-y: auto;
        }
        #ending button {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 12px 30px;
            font-size: 12px;
            cursor: pointer;
            min-height: 40px;
            touch-action: auto;
            font-family: monospace;
        }
        #ending button:active {
            background: #1a1a1a;
            border-color: #666;
            color: #aaa;
        }
        
        /* 解锁通知 */
        #unlockNotify {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0a0a;
            border: 1px solid #8b0000;
            padding: 15px 30px;
            color: #c44;
            font-size: 12px;
            text-align: center;
            display: none;
            z-index: 120;
            font-family: monospace;
            letter-spacing: 2px;
            touch-action: auto;
            pointer-events: none;
        }
        #unlockNotify .unlock-icon { 
            font-size: 16px; 
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="canvas"></canvas>
        <div id="roomName">大厅</div>
        <div id="clueCount">线索: 0</div>
        <button id="soundBtn">--</button>
        <div id="joystick"><div id="knob"></div></div>
        <button id="actBtn">E</button>
        <div id="hint"></div>
        <div id="dialog">
            <h3 id="dTitle">标题</h3>
            <p id="dText">内容</p>
            <button id="dialogBtn" onclick="closeDialog()">继续</button>
        </div>
        
        <!-- 加载画面 -->
        <div id="loading">
            <h2>夜 访 孤 儿 院</h2>
            <div id="loadingDots">加载中</div>
            <div id="loadingBar"><div id="loadingProgress"></div></div>
        </div>
        
        <!-- 主菜单 -->
        <div id="mainMenu">
            <h1>夜 访 孤 儿 院</h1>
            <div class="subtitle">探索废弃孤儿院，揭开27条生命的真相</div>
            <button class="menuBtn" id="newGameBtn" onclick="startNewGame()">新游戏</button>
            <button class="menuBtn" id="continueBtn" onclick="continueGame()">继续游戏</button>
            <button class="menuBtn" id="chapterBtn" onclick="showChapterSelect()">选择章节</button>
            <div class="controls">
                WASD/方向键移动 | E键/点击 交互<br>
                手机：左侧虚拟摇杆 | 右侧E按钮
            </div>
        </div>
        
        <!-- 章节选择 -->
        <div id="chapterSelect">
            <h2>选择章节</h2>
            <div id="chapterList"></div>
            <button id="backBtn" onclick="hideChapterSelect()">返回</button>
        </div>
        
        <!-- 开场画面 -->
        <div id="intro">
            <h1>夜 访 孤 儿 院</h1>
            <div class="story">
                你是林晓，《城市日报》的调查记者。<br><br>
                三天前，你收到一封匿名举报信：<br>
                <span>"向阳福利院的孩子...都消失了..."</span><br><br>
                今晚，你潜入这座废弃的孤儿院，<br>
                试图揭开被掩埋的真相。<br><br>
                线索往往藏在细节中，<br>
                多和幽灵对话，多调查物品，<br>
                也许能发现隐藏的秘密...<br><br>
                <span>操作：WASD/方向键移动 | E键/点击按钮 交互</span>
            </div>
            <button id="startBtn" onclick="beginGame()">开始调查</button>
        </div>
        
        <!-- 结局画面 -->
        <div id="ending">
            <h2 id="endingTitle">结局标题</h2>
            <div class="ending-text" id="endingText">结局内容</div>
            <button id="endBtn" onclick="returnToMenu()">返回主菜单</button>
        </div>
        
        <!-- 解锁通知 -->
        <div id="unlockNotify">
            <div class="unlock-icon">[解锁]</div>
            <div id="unlockText">章节已解锁</div>
        </div>
    </div>

<script>
// ===== 音频系统 =====
var AudioSystem = {
    ctx: null,
    enabled: false,
    bgmOsc: null,
    bgmGain: null,
    initialized: false,
    
    init: function() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
        } catch(e) {
            console.log('Web Audio API not supported');
        }
    },
    
    resume: function() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    },
    
    toggle: function() {
        this.init();
        this.resume();
        this.enabled = !this.enabled;
        document.getElementById('soundBtn').textContent = this.enabled ? '♪' : '--';
        document.getElementById('soundBtn').classList.toggle('active', this.enabled);
        
        if (this.enabled) {
            this.startBGM();
        } else {
            this.stopBGM();
        }
    },
    
    // 脚步声
    playStep: function() {
        if (!this.enabled || !this.ctx) return;
        var osc = this.ctx.createOscillator();
        var gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.frequency.value = 100 + Math.random() * 50;
        osc.type = 'sine';
        gain.gain.value = 0.05;
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    },
    
    // 拾取物品
    playPickup: function() {
        if (!this.enabled || !this.ctx) return;
        var osc = this.ctx.createOscillator();
        var gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.frequency.value = 440;
        osc.type = 'sine';
        gain.gain.value = 0.2;
        osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
    },
    
    // 开门声
    playDoor: function() {
        if (!this.enabled || !this.ctx) return;
        var osc = this.ctx.createOscillator();
        var gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.value = 80;
        gain.gain.value = 0.1;
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
    },
    
    // 对话提示音
    playDialog: function() {
        if (!this.enabled || !this.ctx) return;
        var osc = this.ctx.createOscillator();
        var gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.frequency.value = 523.25; // C5
        osc.type = 'sine';
        gain.gain.value = 0.1;
        osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
        osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.1); // E5
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
    },
    
    // 惊悚音效
    playHorror: function() {
        if (!this.enabled || !this.ctx) return;
        // 低频震动
        var osc = this.ctx.createOscillator();
        var gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.value = 50;
        gain.gain.value = 0.15;
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 1);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 1);
        
        // 高频尖叫
        setTimeout(function() {
            if (!AudioSystem.enabled || !AudioSystem.ctx) return;
            var osc2 = AudioSystem.ctx.createOscillator();
            var gain2 = AudioSystem.ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(AudioSystem.ctx.destination);
            
            osc2.type = 'sine';
            osc2.frequency.value = 800;
            osc2.frequency.exponentialRampToValueAtTime(200, AudioSystem.ctx.currentTime + 0.5);
            gain2.gain.value = 0.1;
            gain2.gain.exponentialRampToValueAtTime(0.001, AudioSystem.ctx.currentTime + 0.5);
            
            osc2.start();
            osc2.stop(AudioSystem.ctx.currentTime + 0.5);
        }, 300);
    },
    
    // 结局音效
    playEnding: function() {
        if (!this.enabled || !this.ctx) return;
        var notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        for (var i = 0; i < notes.length; i++) {
            (function(note, delay) {
                setTimeout(function() {
                    if (!AudioSystem.enabled || !AudioSystem.ctx) return;
                    var osc = AudioSystem.ctx.createOscillator();
                    var gain = AudioSystem.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(AudioSystem.ctx.destination);
                    
                    osc.frequency.value = note;
                    osc.type = 'sine';
                    gain.gain.value = 0.2;
                    gain.gain.exponentialRampToValueAtTime(0.001, AudioSystem.ctx.currentTime + 0.5);
                    
                    osc.start();
                    osc.stop(AudioSystem.ctx.currentTime + 0.5);
                }, delay);
            })(notes[i], i * 200);
        }
    },
    
    // 章节解锁
    playUnlock: function() {
        if (!this.enabled || !this.ctx) return;
        var osc = this.ctx.createOscillator();
        var gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sine';
        osc.frequency.value = 440;
        gain.gain.value = 0.2;
        osc.frequency.setValueAtTime(440, this.ctx.currentTime);
        osc.frequency.setValueAtTime(554.37, this.ctx.currentTime + 0.15);
        osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.5);
    },
    
    // 背景音乐
    startBGM: function() {
        if (!this.enabled || !this.ctx) return;
        this.stopBGM();
        
        this.bgmGain = this.ctx.createGain();
        this.bgmGain.gain.value = 0.05;
        this.bgmGain.connect(this.ctx.destination);
        
        // 根据场景选择BGM
        var roomType = this.getRoomType();
        
        if (roomType === 'children') {
            // 孩子的房间 - 诡异的八音盒
            this.playMusicBox();
        } else if (roomType === 'office' || roomType === 'basement') {
            // 办公室/地下室 - 心跳+电子杂音
            this.playHeartbeat();
        } else {
            // 大厅/走廊 - 低沉的风声
            this.playWind();
        }
    },
    
    playMusicBox: function() {
        if (!this.enabled || !this.ctx) return;
        var notes = [392, 440, 494, 523, 587, 523, 494, 440];
        var noteIndex = 0;
        
        var playNote = function() {
            if (!AudioSystem.enabled || !AudioSystem.ctx) return;
            if (AudioSystem.getRoomType() !== 'children') {
                AudioSystem.startBGM();
                return;
            }
            
            var osc = AudioSystem.ctx.createOscillator();
            var gain = AudioSystem.ctx.createGain();
            osc.connect(gain);
            gain.connect(AudioSystem.bgmGain);
            
            osc.frequency.value = notes[noteIndex];
            osc.type = 'sine';
            gain.gain.value = 0.08;
            gain.gain.exponentialRampToValueAtTime(0.001, AudioSystem.ctx.currentTime + 0.3);
            
            osc.start();
            osc.stop(AudioSystem.ctx.currentTime + 0.3);
            
            noteIndex = (noteIndex + 1) % notes.length;
            setTimeout(playNote, 400);
        };
        
        playNote();
    },
    
    playHeartbeat: function() {
        if (!this.enabled || !this.ctx) return;
        var playBeat = function() {
            if (!AudioSystem.enabled || !AudioSystem.ctx) return;
            if (AudioSystem.getRoomType() !== 'office' && AudioSystem.getRoomType() !== 'basement') {
                AudioSystem.startBGM();
                return;
            }
            
            // 心跳
            for (var i = 0; i < 2; i++) {
                (function(delay) {
                    setTimeout(function() {
                        if (!AudioSystem.enabled || !AudioSystem.ctx) return;
                        var osc = AudioSystem.ctx.createOscillator();
                        var gain = AudioSystem.ctx.createGain();
                        osc.connect(gain);
                        gain.connect(AudioSystem.bgmGain);
                        
                        osc.frequency.value = 40;
                        osc.type = 'sine';
                        gain.gain.value = 0.15;
                        gain.gain.exponentialRampToValueAtTime(0.001, AudioSystem.ctx.currentTime + 0.15);
                        
                        osc.start();
                        osc.stop(AudioSystem.ctx.currentTime + 0.15);
                    }, delay);
                })(i * 150);
            }
            
            // 电子杂音
            setTimeout(function() {
                if (!AudioSystem.enabled || !AudioSystem.ctx) return;
                var bufferSize = AudioSystem.ctx.sampleRate * 0.2;
                var buffer = AudioSystem.ctx.createBuffer(1, bufferSize, AudioSystem.ctx.sampleRate);
                var data = buffer.getChannelData(0);
                for (var j = 0; j < bufferSize; j++) {
                    data[j] = (Math.random() * 2 - 1) * 0.1;
                }
                var noise = AudioSystem.ctx.createBufferSource();
                noise.buffer = buffer;
                var noiseGain = AudioSystem.ctx.createGain();
                noise.connect(noiseGain);
                noiseGain.connect(AudioSystem.bgmGain);
                noiseGain.gain.value = 0.03;
                noise.start();
            }, 300);
            
            setTimeout(playBeat, 1000);
        };
        
        playBeat();
    },
    
    playWind: function() {
        if (!this.enabled || !this.ctx) return;
        var playWind = function() {
            if (!AudioSystem.enabled || !AudioSystem.ctx) return;
            if (AudioSystem.getRoomType() !== 'hall' && AudioSystem.getRoomType() !== 'corridor') {
                AudioSystem.startBGM();
                return;
            }
            
            var bufferSize = AudioSystem.ctx.sampleRate * 2;
            var buffer = AudioSystem.ctx.createBuffer(1, bufferSize, AudioSystem.ctx.sampleRate);
            var data = buffer.getChannelData(0);
            for (var i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.5;
            }
            var noise = AudioSystem.ctx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            
            var filter = AudioSystem.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 200;
            
            var windGain = AudioSystem.ctx.createGain();
            windGain.gain.value = 0.02;
            
            noise.connect(filter);
            filter.connect(windGain);
            windGain.connect(AudioSystem.bgmGain);
            
            noise.start();
            
            // 风会渐渐变弱
            setTimeout(function() {
                windGain.gain.exponentialRampToValueAtTime(0.001, AudioSystem.ctx.currentTime + 1);
                setTimeout(function() {
                    noise.stop();
                    if (AudioSystem.enabled) playWind();
                }, 1000);
            }, 2000);
        };
        
        playWind();
    },
    
    stopBGM: function() {
        if (this.bgmOsc) {
            try { this.bgmOsc.stop(); } catch(e) {}
            this.bgmOsc = null;
        }
    },
    
    getRoomType: function() {
        var room = rooms[currentRoom];
        if (!room) return 'hall';
        
        if (room.name.indexOf('小雨') >= 0 || room.name.indexOf('阿杰') >= 0 || room.name.indexOf('小美') >= 0) {
            return 'children';
        }
        if (room.name.indexOf('办公室') >= 0) return 'office';
        if (room.name.indexOf('后花园') >= 0 || room.name.indexOf('墓地') >= 0) return 'basement';
        if (room.name.indexOf('大厅') >= 0) return 'hall';
        return 'corridor';
    }
};

// ===== 存档系统 =====
var SAVE_KEY = 'nightOrphanage_save';
var SAVE_VERSION = 2;

function saveGame() {
    var saveData = {
        version: SAVE_VERSION,
        currentRoom: currentRoom,
        playerX: player.x,
        playerY: player.y,
        playerDir: player.dir,
        inventory: inventory,
        clues: clues,
        clueCount: clueCount,
        npcTalkCount: npcTalkCount,
        unlockedEndings: unlockedEndings,
        chaptersUnlocked: chaptersUnlocked,
        timestamp: Date.now()
    };
    
    try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    } catch(e) {
        console.log('Save failed:', e);
    }
}

function loadGame() {
    try {
        var data = localStorage.getItem(SAVE_KEY);
        if (!data) return null;
        
        var saveData = JSON.parse(data);
        if (saveData.version !== SAVE_VERSION) {
            // 版本不匹配，尝试迁移或返回null
            console.log('Save version mismatch');
            return null;
        }
        
        return saveData;
    } catch(e) {
        console.log('Load failed:', e);
        return null;
    }
}

function hasSaveData() {
    return loadGame() !== null;
}

function deleteSave() {
    try {
        localStorage.removeItem(SAVE_KEY);
    } catch(e) {}
}

function addClue(clueName) {
    if (clues.indexOf(clueName) < 0) {
        clues.push(clueName);

            setTimeout(function() { AudioSystem.playHorror(); }, 500);

}

// ===== 创建边界墙 =====
function createBorder(w, h) {
    var walls = [];
    for (var x = 0; x < w; x++) {
        for (var y = 0; y < h; y++) {
            if (x === 0 || x === w-1 || y === 0 || y === h-1) {
                walls.push({ x: x, y: y });
            }
        }
    }
    return walls;
}

// ===== 加载画面 =====
function showLoading(callback) {
    var loadingEl = document.getElementById('loading');
    var dots = document.getElementById('loadingDots');
    var progress = document.getElementById('loadingProgress');
    
    loadingEl.style.display = 'flex';
    
    var progressVal = 0;
    var dotCount = 0;
    
    var interval = setInterval(function() {
        progressVal += Math.random() * 15 + 5;
        if (progressVal > 100) progressVal = 100;
        
        progress.style.width = progressVal + '%';
        
        dotCount = (dotCount + 1) % 4;
        dots.textContent = '正在加载' + '.'.repeat(dotCount);
        
        if (progressVal >= 100) {
            clearInterval(interval);
            setTimeout(function() {
                loadingEl.style.display = 'none';
                if (callback) callback();
            }, 500);
        }
    }, 200);
}

    list.innerHTML = '';
    
    for (var i = 0; i < chapters.length; i++) {

        var btn = document.createElement('button');
        btn.className = 'chapterBtn';
        
        var isUnlocked = chaptersUnlocked[ch.id];
        var isCompleted = unlockedEndings.length > 0;
        
        if (isUnlocked) {
            btn.innerHTML = '<span class="ch-name">' + ch.name + '</span><br>' +
                           '<span class="ch-status">' + ch.desc + '</span>';
            btn.onclick = (function(chId) {
                return function() { loadChapter(chId); };
            })(ch.id);
            // 触摸支持
            btn.addEventListener('touchstart', (function(chId) {
                return function(e) {
                    e.preventDefault();
                    loadChapter(chId);
                };
            })(ch.id));
        } else {
            btn.innerHTML = '<span class="ch-lock">🔒 ' + ch.name + '</span><br>' +
                           '<span class="ch-status">' + ch.desc + '</span>';
            btn.disabled = true;
        }
        
        list.appendChild(btn);
    }
}

        player.y = 500;
    } else if (chapterId === 2) {
        currentRoom = 'corridor';
        player.x = 300;
        player.y = 80;
    } else if (chapterId === 3) {

// ===== 绘制函数 - 复古像素风格 =====
function draw() {
    // 纯黑背景 - 参考风格
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 600, 600);
    
    var offsetX = 300 - player.x;
    var offsetY = 300 - player.y;
    
    // 地板 - 深灰色复古砖块纹理
    for (var y = 0; y < 15; y++) {
        for (var x = 0; x < 15; x++) {
            // 深浅交替的砖块
            var shade = ((x + y) % 2) ? '#1a1a1a' : '#151515';
            ctx.fillStyle = shade;
            ctx.fillRect(x * TILE + offsetX, y * TILE + offsetY, TILE, TILE);
            
            // 添加砖缝
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(x * TILE + offsetX, y * TILE + offsetY, TILE, 1);
            ctx.fillRect(x * TILE + offsetX, y * TILE + offsetY, 1, TILE);
        }
    }
    
    // 墙壁 - 参考风格：极细边框勾勒
    for (var i = 0; i < room.walls.length; i++) {
        var w = room.walls[i];
        // 外层深色
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(w.x * TILE + offsetX, w.y * TILE + offsetY, TILE, TILE);
        
        // 内层更深的凹陷效果
        ctx.fillStyle = '#111';
        ctx.fillRect(w.x * TILE + offsetX + 2, w.y * TILE + offsetY + 2, TILE - 4, TILE - 4);
        
        // 极细边框 - 参考风格的关键
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 1;
        ctx.strokeRect(w.x * TILE + offsetX + 0.5, w.y * TILE + offsetY + 0.5, TILE - 1, TILE - 1);
    }
    
    // 房间特定恐怖装饰
    drawRoomDecorations(offsetX, offsetY);
    
    // 物品
    for (var i = 0; i < room.items.length; i++) {
        var item = room.items[i];
        if (inventory.indexOf(item.take) >= 0) continue;
        
        var ix = item.x * TILE + TILE / 2 + offsetX;
        var iy = item.y * TILE + TILE / 2 + offsetY;
        
        if (item.hidden) {
            // 隐藏物品：微弱闪烁
            var alpha = 0.2 + 0.15 * Math.sin(Date.now() / 500);
            ctx.globalAlpha = alpha;
            drawItem(ix, iy, item.type, item.name);
            ctx.globalAlpha = 1;
        } else {
            drawItem(ix, iy, item.type, item.name);
        }
        
        // 高亮提示 - 参考风格改为简洁白框
        if (nearObj && nearObj.name === item.name) {
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.strokeRect(item.x * TILE + offsetX + 2, item.y * TILE + offsetY + 2, TILE - 4, TILE - 4);
        }
    }
    
    // NPC - 像素幽灵风格
    for (var i = 0; i < room.npcs.length; i++) {
        var npc = room.npcs[i];
        var nx = npc.x + offsetX;
        var ny = npc.y + offsetY;
        drawGhost(nx, ny, npc.color, npc.name);
        
        if (nearObj && nearObj.name === npc.name) {
            // 简洁高亮框
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.strokeRect(nx - 16, ny - 22, 32, 40);
            
            // 显示NPC介绍 - 简洁风格
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(nx - 55, ny - 50, 110, 20);
            ctx.fillStyle = '#555';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(npc.intro, nx, ny - 36);
        }
    }
    
    // 出口
    for (var i = 0; i < room.exits.length; i++) {
        var e = room.exits[i];
        var ex = e.x * TILE + offsetX;
        var ey = e.y * TILE + offsetY;
        
        // 检查章节锁定 - 简洁风格
        if (e.requiresChapter && !chaptersUnlocked[e.requiresChapter]) {
            ctx.fillStyle = '#0d0d0d';
        } else if (e.requires && inventory.indexOf(e.requires) < 0) {
            ctx.fillStyle = '#0d0808';
        } else {
            ctx.fillStyle = '#080d08';
        }
        ctx.fillRect(ex - TILE/2, ey - TILE/2, TILE, TILE);
        
        // 简洁边框
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 1;
        ctx.strokeRect(ex - TILE/2 + 0.5, ey - TILE/2 + 0.5, TILE - 1, TILE - 1);
        
        ctx.fillStyle = '#555';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        
        var exitLabel = '>' + e.name;
        if (e.requiresChapter && !chaptersUnlocked[e.requiresChapter]) {
            exitLabel = 'x' + e.name;
        } else if (e.requires && inventory.indexOf(e.requires) < 0) {
            exitLabel = 'x' + e.name;
        }
        ctx.fillText(exitLabel, ex, ey + 3);
    }
    
    // 玩家
    drawPlayer(300, 300, player.dir);
}

// 房间恐怖装饰
function drawRoomDecorations(offsetX, offsetY) {
    var roomName = room.name;
    
    // 后花园 - 血迹效果
    if (roomName.indexOf('后花园') >= 0 || roomName.indexOf('花园') >= 0) {
        drawBloodStain(offsetX, offsetY, 3, 10, 40);
        drawBloodStain(offsetX, offsetY, 5, 8, 25);
        drawBloodStain(offsetX, offsetY, 9, 5, 35);
    }
    
    // 阿杰的房间 - 更浓的血迹
    if (roomName.indexOf('阿杰') >= 0) {
        drawBloodStain(offsetX, offsetY, 4, 6, 50);
        drawBloodStain(offsetX, offsetY, 8, 9, 30);
        drawCrack(offsetX, offsetY, 2, 3);
    }
    
    // 办公室 - 墙壁裂缝
    if (roomName.indexOf('办公室') >= 0 || roomName.indexOf('办公室') >= 0) {
        drawCrack(offsetX, offsetY, 10, 2);
        drawCrack(offsetX, offsetY, 4, 12);
    }
    
    // 小雨的房间 - 霉斑
    if (roomName.indexOf('小雨') >= 0) {
        drawMold(offsetX, offsetY, 1, 5);
        drawMold(offsetX, offsetY, 13, 8);
    }
    
    // 小美的房间 - 脱落的墙皮
    if (roomName.indexOf('小美') >= 0) {
        drawPeelingWall(offsetX, offsetY, 11, 4);
        drawCrack(offsetX, offsetY, 3, 7);
    }
}

// 血迹效果 - 参考风格
function drawBloodStain(offsetX, offsetY, tileX, tileY, size) {
    var bx = tileX * TILE + TILE / 2 + offsetX;
    var by = tileY * TILE + TILE / 2 + offsetY;
    
    ctx.fillStyle = '#2a0000';
    // 主血迹
    ctx.beginPath();
    ctx.arc(bx, by, size / 3, 0, Math.PI * 2);
    ctx.fill();
    
    // 溅射痕迹
    ctx.fillStyle = '#1a0000';
    for (var i = 0; i < 4; i++) {
        var angle = Math.random() * Math.PI * 2;
        var dist = size / 2 + Math.random() * size / 2;
        var sx = bx + Math.cos(angle) * dist;
        var sy = by + Math.sin(angle) * dist;
        ctx.beginPath();
        ctx.arc(sx, sy, 2 + Math.random() * 3, 0, Math.PI * 2);
        ctx.fill();
    }
}

// 墙壁裂缝
function drawCrack(offsetX, offsetY, tileX, tileY) {
    var cx = tileX * TILE + offsetX;
    var cy = tileY * TILE + offsetY;
    
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 8, cy + 12);
    ctx.lineTo(cx + 15, cy + 8);
    ctx.lineTo(cx + 20, cy + 18);
    ctx.stroke();
}

// 霉斑
function drawMold(offsetX, offsetY, tileX, tileY) {
    var mx = tileX * TILE + TILE / 2 + offsetX;
    var my = tileY * TILE + TILE / 2 + offsetY;
    
    ctx.fillStyle = '#1a1a1a';
    for (var i = 0; i < 5; i++) {
        var ox = (Math.random() - 0.5) * 20;
        var oy = (Math.random() - 0.5) * 20;
        ctx.beginPath();
        ctx.arc(mx + ox, my + oy, 3 + Math.random() * 4, 0, Math.PI * 2);
        ctx.fill();
    }
}

// 脱落墙皮
function drawPeelingWall(offsetX, offsetY, tileX, tileY) {
    var px = tileX * TILE + offsetX;
    var py = tileY * TILE + offsetY;
    
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + 15, py + 5);
    ctx.lineTo(px + 20, py + 15);
    ctx.lineTo(px + 5, py + 12);
    ctx.closePath();
    ctx.fill();
    
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 1;
    ctx.stroke();
}

// 玩家绘制 - 参考风格：黑色短发像素小人
function drawPlayer(x, y, dir) {
    // 身体 - 深色衣服
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x - 7, y - 2, 14, 14);
    
    // 衣服细节 - 像素线条
    ctx.fillStyle = '#222';
    ctx.fillRect(x - 7, y + 4, 14, 2);
    
    // 脸 - 米白色，无明确五官（参考风格）
    ctx.fillStyle = '#d4c8b8';
    ctx.fillRect(x - 5, y - 12, 10, 10);
    
    // 头发 - 黑色短发（参考风格关键）
    ctx.fillStyle = '#1a1a1a';
    // 刘海
    ctx.fillRect(x - 5, y - 14, 10, 5);
    // 两侧
    ctx.fillRect(x - 6, y - 12, 2, 6);
    ctx.fillRect(x + 4, y - 12, 2, 6);
    // 后脑勺
    ctx.fillRect(x - 5, y - 14, 2, 4);
    ctx.fillRect(x + 3, y - 14, 2, 4);
    
    // 眼睛 - 极简
    ctx.fillStyle = '#333';
    if (dir === 'down') {
        ctx.fillRect(x - 3, y - 8, 2, 2);
        ctx.fillRect(x + 1, y - 8, 2, 2);
    } else if (dir === 'up') {
        // 背面不画眼睛
    } else if (dir === 'left') {
        ctx.fillRect(x - 3, y - 8, 2, 2);
    } else {
        ctx.fillRect(x + 1, y - 8, 2, 2);
    }
    
    // 腿 - 深色
    ctx.fillStyle = '#222';
    ctx.fillRect(x - 5, y + 12, 4, 5);
    ctx.fillRect(x + 1, y + 12, 4, 5);
}

// NPC幽灵绘制 - 像素风格，简洁但有存在感
function drawGhost(x, y, color, name) {
    // 半透明身体
    ctx.globalAlpha = 0.6;
    
    // 身体轮廓
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x - 10, y - 6, 20, 18);
    
    // 头部
    ctx.fillStyle = '#252525';
    ctx.fillRect(x - 8, y - 14, 16, 12);
    
    // 角色特定颜色标识（简洁的色块）
    if (name === '小雨') {
        // 粉色标识 - 小女孩
        ctx.fillStyle = '#3a2a2a';
        ctx.fillRect(x - 8, y - 14, 16, 12);
        ctx.fillStyle = '#2a1a1a';
        ctx.fillRect(x - 6, y - 12, 12, 8);
    } else if (name === '阿杰') {
        // 灰绿色标识
        ctx.fillStyle = '#2a2a1a';
        ctx.fillRect(x - 8, y - 14, 16, 12);
    } else if (name === '小美') {
        // 紫色标识
        ctx.fillStyle = '#2a1a2a';
        ctx.fillRect(x - 8, y - 14, 16, 12);
    }
    
    // 眼睛 - 发光效果
    ctx.fillStyle = '#444';
    ctx.fillRect(x - 5, y - 10, 3, 3);
    ctx.fillRect(x + 2, y - 10, 3, 3);
    
    // 嘴巴 - 简单线条
    ctx.fillRect(x - 2, y - 5, 4, 1);
    
    ctx.globalAlpha = 1;
}

// 物品绘制 - 复古像素风格，增加细节
function drawItem(x, y, type, name) {

    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x - 10, y + 8, 20, 3);
    
    // 绘制物品 - 复古像素风
    switch(type) {
        case 'desk':
            // 木桌 - 深色
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 16, y - 10, 32, 20);
            ctx.fillStyle = '#1a1510';
            ctx.fillRect(x - 14, y - 8, 28, 16);
            // 桌腿
            ctx.fillStyle = '#1a1510';
            ctx.fillRect(x - 14, y + 10, 4, 6);
            ctx.fillRect(x + 10, y + 10, 4, 6);
            break;
        case 'cabinet':
        case 'shelf':
            // 木柜
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 14, y - 14, 28, 28);
            ctx.fillStyle = '#1a1510';
            ctx.fillRect(x - 12, y - 12, 24, 24);
            // 中缝
            ctx.fillStyle = '#0a0808';
            ctx.fillRect(x - 1, y - 12, 2, 24);
            break;
        case 'drawer':
            // 抽屉（锁住）
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 12, y - 8, 24, 16);
            ctx.fillStyle = '#1a1510';
            ctx.fillRect(x - 10, y - 6, 20, 12);
            // 锁孔
            ctx.fillStyle = '#555';
            ctx.fillRect(x - 2, y - 2, 4, 3);
            break;
        case 'drawer_open':
            // 抽屉（打开）
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 12, y - 8, 24, 16);
            ctx.fillStyle = '#0a0808';
            ctx.fillRect(x - 10, y - 4, 20, 12);
            break;
        case 'board':
            // 公告板
            ctx.fillStyle = '#3a3020';
            ctx.fillRect(x - 12, y - 12, 24, 24);
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 10, y - 10, 20, 20);
            // 钉子
            ctx.fillStyle = '#666';
            ctx.fillRect(x - 2, y - 12, 4, 2);
            ctx.fillRect(x - 2, y + 10, 4, 2);
            break;
        case 'window':
            // 封死的窗户
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x - 12, y - 14, 24, 28);
            ctx.fillStyle = '#111';
            ctx.fillRect(x - 10, y - 12, 20, 24);
            // 木板封条
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 10, y - 6, 20, 4);
            ctx.fillRect(x - 10, y + 2, 20, 4);
            break;
        case 'lamp':
            // 落地灯
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 2, y - 8, 4, 18);
            ctx.fillStyle = '#444';
            ctx.fillRect(x - 6, y - 14, 12, 8);
            // 微光
            ctx.fillStyle = '#3a3020';
            ctx.fillRect(x - 4, y - 12, 8, 4);
            break;
        case 'key':
            // 钥匙
            ctx.fillStyle = '#555';
            ctx.fillRect(x - 4, y - 4, 16, 8);
            // 钥匙环
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x - 6, y, 5, 0, Math.PI * 2);
            ctx.stroke();
            // 齿
            ctx.fillRect(x + 6, y - 4, 3, 8);
            ctx.fillRect(x + 10, y - 2, 2, 4);
            break;
        case 'bed':
            // 小床
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 16, y - 6, 32, 18);
            // 枕头
            ctx.fillStyle = '#3a3530';
            ctx.fillRect(x - 14, y - 8, 12, 6);
            // 被子
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 2, y - 4, 14, 14);
            break;
        case 'toy':
        case 'doll':
            // 人偶
            ctx.fillStyle = '#3a3028';
            ctx.beginPath();
            ctx.arc(x, y - 6, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 5, y, 10, 12);
            // 眼睛
            ctx.fillStyle = '#666';
            ctx.fillRect(x - 3, y - 8, 2, 2);
            ctx.fillRect(x + 1, y - 8, 2, 2);
            break;
        case 'bottle':
            // 玻璃瓶 - 阿杰的收藏
            ctx.fillStyle = '#1a2520';
            ctx.fillRect(x - 5, y - 6, 10, 16);
            ctx.fillStyle = '#111';
            ctx.fillRect(x - 4, y - 12, 8, 8);
            // 瓶口
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 3, y - 14, 6, 4);
            break;
        case 'grave':
            // 坟墓
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x - 8, y - 4, 16, 16);
            // 墓碑
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(x, y - 4, 8, Math.PI, 0);
            ctx.fill();
            // 木牌
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 1, y - 10, 2, 12);
            break;
        case 'tree':
            // 枯树
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 3, y, 6, 18);
            // 枯枝
            ctx.strokeStyle = '#2a2018';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y - 5);
            ctx.lineTo(x - 10, y - 15);
            ctx.moveTo(x, y);
            ctx.lineTo(x + 8, y - 10);
            ctx.stroke();
            break;
        case 'mirror':
            // 镜子
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(x - 10, y - 16, 20, 32);
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x - 8, y - 14, 16, 28);
            // 边框
            ctx.strokeStyle = '#3a3020';
            ctx.lineWidth = 1;
            ctx.strokeRect(x - 8, y - 14, 16, 28);
            break;
        case 'book':
            // 旧书
            ctx.fillStyle = '#2a1a18';
            ctx.fillRect(x - 10, y - 6, 20, 12);
            ctx.fillStyle = '#1a0a08';
            ctx.fillRect(x - 8, y - 4, 16, 8);
            break;
        case 'diary':
            // 日记本
            ctx.fillStyle = '#2a1a2a';
            ctx.fillRect(x - 9, y - 7, 18, 14);
            ctx.fillStyle = '#1a0a1a';
            ctx.fillRect(x - 7, y - 5, 14, 10);
            // 锁扣
            ctx.fillStyle = '#555';
            ctx.fillRect(x - 1, y - 2, 2, 3);
            break;
        case 'note':
            // 纸片
            ctx.fillStyle = '#2a2820';
            ctx.fillRect(x - 8, y - 6, 16, 12);
            ctx.fillStyle = '#1a1810';
            ctx.fillRect(x - 6, y - 4, 12, 8);
            break;
        case 'computer':
            // 旧电脑（关闭）
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x - 12, y - 16, 24, 20);
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x - 10, y - 14, 20, 16);
            // 底座
            ctx.fillStyle = '#222';
            ctx.fillRect(x - 8, y + 4, 16, 3);
            break;
        case 'computer_open':
            // 旧电脑（开启）
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x - 12, y - 16, 24, 20);
            // 屏幕 - 绿色文字
            ctx.fillStyle = '#0a1a0a';
            ctx.fillRect(x - 10, y - 14, 20, 14);
            ctx.fillStyle = '#2a4a2a';
            ctx.fillRect(x - 8, y - 12, 8, 2);
            ctx.fillRect(x - 8, y - 8, 12, 2);
            ctx.fillRect(x - 8, y - 4, 6, 2);
            // 底座
            ctx.fillStyle = '#222';
            ctx.fillRect(x - 8, y + 4, 16, 3);
            break;
        case 'safe':
            // 保险柜
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 12, y - 12, 24, 24);
            ctx.fillStyle = '#222';
            ctx.fillRect(x - 10, y - 10, 20, 20);
            // 转盘
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'cage':
            // 鸟笼
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            ctx.strokeRect(x - 10, y - 16, 20, 28);
            // 栏杆
            for (var c = -6; c <= 6; c += 3) {
                ctx.beginPath();
                ctx.moveTo(x + c, y - 16);
                ctx.lineTo(x + c, y + 12);
                ctx.stroke();
            }
            // 横杆
            ctx.beginPath();
            ctx.moveTo(x - 10, y - 4);
            ctx.lineTo(x + 10, y - 4);
            ctx.moveTo(x - 10, y + 6);
            ctx.lineTo(x + 10, y + 6);
            ctx.stroke();
            break;
        case 'photo':
            // 照片
            ctx.fillStyle = '#3a3530';
            ctx.fillRect(x - 10, y - 8, 20, 16);
            ctx.fillStyle = '#2a2520';
            ctx.fillRect(x - 8, y - 6, 16, 12);
            break;
        case 'paper':
            // 纸张
            ctx.fillStyle = '#3a3830';
            ctx.fillRect(x - 7, y - 5, 14, 10);
            break;
        default:
            // 默认物品 - 灰色方块
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x - 8, y - 8, 16, 16);
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 5, y - 5, 10, 10);
    }
    
    // 显示物品名称 - 简洁风格
    if (name) {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(x - 28, y + 14, 56, 14);
        ctx.fillStyle = '#555';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(name, x, y + 23);
    }
}

// ===== 游戏逻辑 =====
function update() {
    if (dialogOpen || !gameStarted || gameState === 'ending') return;
    
    var dx = 0, dy = 0;
    var speed = 3;
    
    // 键盘
    if (keysDown['w'] || keysDown['arrowup']) dy = -speed;
    if (keysDown['s'] || keysDown['arrowdown']) dy = speed;
    if (keysDown['a'] || keysDown['arrowleft']) dx = -speed;
    if (keysDown['d'] || keysDown['arrowright']) dx = speed;
    
    // 摇杆
    if (joyActive) {
        dx = joyX * speed;
        dy = joyY * speed;
    }
    
    // 斜向移动
    if (dx !== 0 && dy !== 0) {
        dx *= 0.707;
        dy *= 0.707;
    }
    
    // 方向
    if (dx < 0) player.dir = 'left';
    else if (dx > 0) player.dir = 'right';
    else if (dy < 0) player.dir = 'up';
    else if (dy > 0) player.dir = 'down';
    
    // 碰撞检测
    var newX = player.x + dx;
    var newY = player.y + dy;
    var moved = false;
    
    if (!checkCollision(newX, player.y)) {
        player.x = newX;
        moved = dx !== 0;
    }
    if (!checkCollision(player.x, newY)) {
        player.y = newY;
        moved = moved || dy !== 0;
    }
    
    // 脚步声
    if (moved) {
        var now = Date.now();
        if (now - lastStepTime > 300) {
            AudioSystem.playStep();
            lastStepTime = now;
        }
    }
    
    // 检查出口
    checkExits();
    
    // 检查附近
    checkNear();
    
    // 更新UI - 简洁风格
    document.getElementById('roomName').textContent = room.name;
    document.getElementById('actBtn').style.display = nearObj ? 'block' : 'none';
    
    // BGM根据房间切换
    if (lastRoom !== currentRoom) {
        lastRoom = currentRoom;
        if (AudioSystem.enabled) {
            AudioSystem.startBGM();
        }
    }
}

function checkCollision(x, y) {
    var tx = Math.floor(x / TILE);
    var ty = Math.floor(y / TILE);
    
    for (var i = 0; i < room.walls.length; i++) {
        var w = room.walls[i];
        if (w.x === tx && w.y === ty) return true;
    }
    return false;
}

function checkExits() {
    for (var i = 0; i < room.exits.length; i++) {
        var e = room.exits[i];
        var ex = e.x * TILE + TILE / 2;
        var ey = e.y * TILE + TILE / 2;
        var dist = Math.sqrt((player.x - ex) * (player.x - ex) + (player.y - ey) * (player.y - ey));
        
        if (dist < 40) {
            // 检查章节锁定
            if (e.requiresChapter && !chaptersUnlocked[e.requiresChapter]) {
                var chapterName = '第' + e.requiresChapter + '章';
                showDialog('[锁定] ' + e.name, '这里被锁住了。需要先完成' + chapterName + '的探索。');
                return;
            }
            
            // 检查是否需要钥匙
            if (e.requires && inventory.indexOf(e.requires) < 0) {
                showDialog('[锁定] ' + e.name, e.lockedText || '这扇门需要钥匙才能打开。');
                return;
            }
            
            // 切换房间
            AudioSystem.playDoor();
            room = rooms[e.to];
            player.x = e.tx;
            player.y = e.ty;
            nearObj = null;
            
            // 自动保存
            currentRoom = e.to;
            saveGame();
            
            return;
        }
    }
}

function checkNear() {
    nearObj = null;
    
    // 检查物品
    for (var i = 0; i < room.items.length; i++) {
        var item = room.items[i];
        if (inventory.indexOf(item.take) >= 0) continue;
        
        var ix = item.x * TILE + TILE / 2;
        var iy = item.y * TILE + TILE / 2;
        var dist = Math.sqrt((player.x - ix) * (player.x - ix) + (player.y - iy) * (player.y - iy));
        
        if (dist < 50) {
            nearObj = item;
            return;
        }
    }
    
    // 检查NPC
    for (var j = 0; j < room.npcs.length; j++) {
        var npc = room.npcs[j];
        var dist = Math.sqrt((player.x - npc.x) * (player.x - npc.x) + (player.y - npc.y) * (player.y - npc.y));
        
        if (dist < 60) {
            nearObj = npc;
            nearObj.isNpc = true;
            return;
        }
    }
    
    // 检查出口
    for (var k = 0; k < room.exits.length; k++) {
        var e = room.exits[k];
        var ex = e.x * TILE + TILE / 2;
        var ey = e.y * TILE + TILE / 2;
        var dist = Math.sqrt((player.x - ex) * (player.x - ex) + (player.y - ey) * (player.y - ey));
        
        if (dist < 50) {
            nearObj = e;
            nearObj.isExit = true;
            return;
        }
    }
}

function interact() {
    if (dialogOpen) {
        closeDialog();
        return;
    }
    if (!nearObj) return;
    
    if (nearObj.isExit) {
        // 显示出口信息
        if (nearObj.requiresChapter && !chaptersUnlocked[nearObj.requiresChapter]) {
            var chapterName = '第' + nearObj.requiresChapter + '章';
            showDialog('[锁定] ' + nearObj.name, '这里被锁住了。需要先完成' + chapterName + '的探索。');
        } else if (nearObj.requires && inventory.indexOf(nearObj.requires) < 0) {
            showDialog('[锁定] ' + nearObj.name, nearObj.lockedText || '这扇门需要钥匙。');
        } else {
            showDialog('[出口] ' + nearObj.name, '按E键/点击按钮进入 -> ' + nearObj.name);
        }
        return;
    }
    
    if (nearObj.isNpc) {
        // NPC对话
        if (!npcTalkCount[nearObj.name]) npcTalkCount[nearObj.name] = 0;
        
        var lines = nearObj.lines;
        // 检查是否解锁隐藏对话
        if (npcTalkCount[nearObj.name] >= nearObj.hiddenTrigger && nearObj.hiddenLines) {
            var hiddenIndex = Math.min(npcTalkCount[nearObj.name] - nearObj.hiddenTrigger, nearObj.hiddenLines.length - 1);
            lines = nearObj.hiddenLines;
        }
        
        if (!nearObj.lineIndex) nearObj.lineIndex = 0;
        
        // 如果是隐藏对话
        if (npcTalkCount[nearObj.name] >= nearObj.hiddenTrigger && nearObj.hiddenLines) {
            var hiddenIdx = Math.min(npcTalkCount[nearObj.name] - nearObj.hiddenTrigger, nearObj.hiddenLines.length - 1);
            lines = nearObj.hiddenLines;
            nearObj.lineIndex = hiddenIdx;
        }
        
        var text = lines[nearObj.lineIndex];
        
        // 添加线索
        if (npcTalkCount[nearObj.name] >= nearObj.hiddenTrigger) {
            if (npcTalkCount[nearObj.name] === nearObj.hiddenTrigger) {
                if (nearObj.name === '小雨') addClue('小雨的故事');
                if (nearObj.name === '阿杰') addClue('阿杰的故事');
                if (nearObj.name === '小美') addClue('小美的故事');
            }
        }
        
        npcTalkCount[nearObj.name]++;
        nearObj.lineIndex = (nearObj.lineIndex + 1) % lines.length;
        
        AudioSystem.playDialog();
        showDialog(nearObj.name + ' [幽灵]', text);
        
        // 保存对话进度
        saveGame();
        
    } else {
        // 物品交互
        if (nearObj.type === 'computer') {
            var pwd = prompt('请输入密码（提示：院长的名字拼音+出生年份1945）：');
            if (pwd === nearObj.password) {
                addClue('向阳计划');
                showDialog(nearObj.name, rooms.office.items.find(function(i) { return i.type === 'computer_open'; }).text);
            } else if (pwd !== null) {
                showDialog(nearObj.name, '密码错误！');
            }
            return;
        }
        
        if (nearObj.type === 'drawer' && nearObj.locked) {
            if (inventory.indexOf('钥匙') >= 0) {
                nearObj.type = 'drawer_open';
                nearObj.name = '抽屉（已开）';
                nearObj.locked = false;
                nearObj.requires = '钥匙';
                showDialog('[已解锁] ' + nearObj.name, rooms.room3.items.find(function(i) { return i.type === 'drawer_open'; }).text);
                if (rooms.room3.items.find(function(i) { return i.type === 'drawer_open'; }).clue) {
                    addClue(rooms.room3.items.find(function(i) { return i.type === 'drawer_open'; }).clue);
                }
                return;
            } else {
                showDialog(nearObj.name, nearObj.text);
                return;
            }
        }
        
        if (nearObj.take) {
            inventory.push(nearObj.take);
            showDialog('[获得物品] ' + nearObj.name, nearObj.text);
            
            // 检查第四章解锁
            if (nearObj.take === '地下室钥匙') {
                checkChapterUnlocks();
            }
        } else {
            showDialog(nearObj.name, nearObj.text);
        }
        
        // 添加线索
        if (nearObj.clue && !hasClue(nearObj.clue)) {
            addClue(nearObj.clue);
        }
        
        // 隐藏物品触发
        if (nearObj.hidden && nearObj.name === '地上的纸片') {
            addClue('林小雨');
            setTimeout(function() {
                showEnding('hidden', '[隐藏结局] 我是谁？', 
                    '你看着地上的纸片，手指颤抖...\n\n"林小雨...7岁..."\n\n你突然头痛欲裂，记忆像碎片一样涌来——\n\n被拐卖、被送进孤儿院、被人领养、长大后成为记者...\n\n你一直在追查的真相，竟然与自己有关。\n\n27个孩子...包括你自己。\n\n你跪在泥土里，泪流满面。\n\n小雨...那是你失散的双胞胎妹妹吗？\n\n真相已经不重要了，因为你知道——\n\n她们都在这里，永远不会孤单。\n\n【游戏结束】');
            }, 2000);
        }
    }
}

function showDialog(title, text) {
    dialogOpen = true;
    document.getElementById('dTitle').textContent = title;
    document.getElementById('dText').textContent = text;
    document.getElementById('dialog').style.display = 'block';
}

function closeDialog() {
    dialogOpen = false;
    document.getElementById('dialog').style.display = 'none';
}

// ===== 输入处理 =====
var keysDown = {};

document.addEventListener('keydown', function(e) {
    keysDown[e.key.toLowerCase()] = true;
    if (e.key === 'e' || e.key === ' ') {
        e.preventDefault();
        interact();
    }
});

document.addEventListener('keyup', function(e) {
    keysDown[e.key.toLowerCase()] = false;
});

// 音效按钮
document.getElementById('soundBtn').addEventListener('click', function() {
    AudioSystem.toggle();
});

// 摇杆控制
var joystick = document.getElementById('joystick');
var knob = document.getElementById('knob');

function moveJoystick(clientX, clientY) {
    var rect = joystick.getBoundingClientRect();
    var centerX = rect.left + 50;
    var centerY = rect.top + 50;
    
    var dx = clientX - centerX;
    var dy = clientY - centerY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist > 40) {
        dx = dx / dist * 40;
        dy = dy / dist * 40;
    }
    
    knob.style.left = (30 + dx) + 'px';
    knob.style.top = (30 + dy) + 'px';
    
    joyX = dx / 40;
    joyY = dy / 40;
}

joystick.addEventListener('touchstart', function(e) {
    e.preventDefault();
    joyActive = true;
    moveJoystick(e.touches[0].clientX, e.touches[0].clientY);
});

joystick.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (joyActive) {
        moveJoystick(e.touches[0].clientX, e.touches[0].clientY);
    }
});

joystick.addEventListener('touchend', function(e) {
    joyActive = false;
    joyX = 0;
    joyY = 0;
    knob.style.left = '30px';
    knob.style.top = '30px';
});

// E按钮
document.getElementById('actBtn').addEventListener('click', interact);
document.getElementById('actBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    interact();
});

// 弹窗按钮 - 触摸支持
document.getElementById('dialogBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    closeDialog();
});

// 开始游戏按钮 - 触摸支持
document.getElementById('startBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    beginGame();
});

// 结局返回按钮 - 触摸支持
document.getElementById('endBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    returnToMenu();
});

// 主菜单按钮 - 触摸支持
document.getElementById('newGameBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    startNewGame();
});
document.getElementById('continueBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    continueGame();
});
document.getElementById('chapterBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    showChapterSelect();
});
document.getElementById('backBtn').addEventListener('touchstart', function(e) {
    e.preventDefault();
    hideChapterSelect();
});

// ===== 游戏循环 =====
function gameLoop() {
    if (gameStarted && gameState === 'playing') {
        update();
        draw();
    }
    requestAnimationFrame(gameLoop);
}

// ===== 初始化 =====
function init() {
    showLoading(function() {
        showMainMenu();
        gameLoop();
    });
}

// 页面加载完成后初始化
window.addEventListener('load', init);
</script>
